name: Regression Gate

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  regression-gate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run regression gate
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          PYTHONPATH=src python src/main.py --regression-gate
        id: regression_gate

      - name: Upload regression report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-report-${{ github.run_id }}
          path: data/output/regression_report_*.json
          if-no-files-found: warn

      - name: Post breach summary as PR comment
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const glob = require('@actions/glob');

            const pattern = 'data/output/regression_report_*.json';
            const globber = await glob.create(pattern);
            const files = await globber.glob();

            let body = '## Regression Gate Failed\n\nThreshold breaches detected:\n\n';
            if (files.length > 0) {
              const report = JSON.parse(fs.readFileSync(files[0], 'utf8'));
              for (const breach of (report.breaches || [])) {
                body += `- ❌ ${breach}\n`;
              }
              body += `\n**Overall accuracy:** ${(report.overall_accuracy * 100).toFixed(1)}%`;
              body += ` (${report.passed_cases}/${report.total_cases} cases)\n`;
            } else {
              body += '_No report file found._\n';
            }

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
