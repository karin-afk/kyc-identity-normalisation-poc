{% extends "base.html" %}
{% block title %}Sentence Normalisation{% endblock %}
{% block content %}
<section class="section">
	<h1 class="page-title">Sentence Normalisation</h1>
	<p class="page-subtitle">Paste a name, address, company name, date, or short phrase. The tool normalises it to English. Maximum 2,000 characters.</p>

	<form class="stack-20" hx-post="{{ url_for('paste.translate') }}" hx-target="#paste-result" hx-swap="innerHTML">
		<label class="section-label" for="original-text">Input text</label>
		<textarea id="original-text" name="original_text" maxlength="2000" dir="auto" required></textarea>
		<div id="char-counter" class="counter">0 / 2,000</div>

		<div class="two-col">
			<div>
				<label class="section-label" for="field-type">Field type</label>
				<select id="field-type" name="field_type">
					<option value="person_name">Person name</option>
					<option value="company_name">Company / entity name</option>
					<option value="address">Address</option>
					<option value="date">Date</option>
					<option value="nationality">Nationality / country</option>
					<option value="legal_form">Legal form</option>
					<option value="status">Company status</option>
					<option value="designation">Role / designation</option>
					<option value="business_purpose">Nature of business</option>
					<option value="issuing_authority">Issuing authority</option>
					<option value="other">Other</option>
				</select>
			</div>
			<div>
				<label class="section-label" for="paste-language">Language hint</label>
				<select id="paste-language" name="language">
					<option value="">Auto-detect</option>
					<option value="ar">Arabic</option>
					<option value="be">Belarusian</option>
					<option value="bg">Bulgarian</option>
					<option value="zh">Chinese</option>
					<option value="da">Danish</option>
					<option value="nl">Dutch</option>
					<option value="en">English</option>
					<option value="fa">Farsi / Persian</option>
					<option value="fr">French</option>
					<option value="de">German</option>
					<option value="el">Greek</option>
					<option value="he">Hebrew</option>
					<option value="it">Italian</option>
					<option value="ja">Japanese</option>
					<option value="ko">Korean</option>
					<option value="no">Norwegian</option>
					<option value="pl">Polish</option>
					<option value="pt">Portuguese</option>
					<option value="ru">Russian</option>
					<option value="es">Spanish</option>
					<option value="sv">Swedish</option>
					<option value="th">Thai</option>
					<option value="tr">Turkish</option>
					<option value="uk">Ukrainian</option>
				</select>
			</div>
		</div>

		<button type="submit" class="btn btn-primary">Normalise</button>
		<div class="htmx-indicator muted">Normalising text...</div>
	</form>

	<div id="paste-result" class="results-block"></div>
</section>

<script>
	const input = document.getElementById('original-text');
	const counter = document.getElementById('char-counter');
	const syncCounter = () => { counter.textContent = `${input.value.length} / 2,000`; };
	input.addEventListener('input', syncCounter);
	syncCounter();
</script>
{% endblock %}
