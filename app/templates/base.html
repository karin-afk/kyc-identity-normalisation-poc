<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="telemetry-event-url" content="{{ url_for('telemetry.event') }}">
  <meta name="telemetry-session-end-url" content="{{ url_for('telemetry.session_end') }}">
  <meta name="session-trace-id" content="{{ session_trace_id }}">
  <title>{% block title %}KYC Normalisation{% endblock %}</title>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
  <script defer src="{{ url_for('static', filename='js/session_trace.js') }}"></script>
</head>
<body>
  <header class="topbar">
    <div class="brand">KYC Normalisation</div>
    <nav class="tabs" aria-label="Primary">
      <a class="tab{% if request.path.startswith('/upload') or request.path == '/' %} tab-active{% endif %}" href="{{ url_for('upload.index') }}" data-tab-name="document">Document</a>
      <a class="tab{% if request.path.startswith('/paste') %} tab-active{% endif %}" href="{{ url_for('paste.index') }}" data-tab-name="sentence">Sentence</a>
      {% if current_user_is_native_speaker %}
      <a class="tab{% if request.path.startswith('/review') %} tab-active{% endif %}" href="{{ url_for('review.index') }}" data-tab-name="review">Review</a>
      {% endif %}
    </nav>
  </header>

  <main class="page-wrap">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
